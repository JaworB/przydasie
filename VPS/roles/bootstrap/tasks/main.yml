---
- name: Change root password
  user:
    name: root
    password: "{{ bootstrap_new_password | password_hash('sha512') }}"
    update_password: always

- name: Create .ssh directory
  file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Deploy SSH public key
  authorized_key:
    user: root
    key: "{{ lookup('file', ssh_public_key | default('~/.ssh/id_rsa.pub')) }}"
    state: present
