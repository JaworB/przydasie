---
- name: Create groups
  ansible.builtin.group:
    name: "{{ item.groups }}"
    state: present
  when: item.groups is defined
  loop: "{{ role_users_user_details }}"

- name: Create users - with password
  ansible.builtin.user:
    name: "{{ item.username }}"
    groups: "{{ item.groups | default('') }}"
    append: true
    create_home: true
    password: "{{ vault_user_password | password_hash('sha512') }}"
    password_expire_max: -1
    comment: "Created during provisioning"
  loop: "{{ role_users_user_details }}"
  when: vault_user_password is defined

- name: Create users - without password (locked)
  ansible.builtin.user:
    name: "{{ item.username }}"
    groups: "{{ item.groups | default('') }}"
    append: true
    create_home: true
    password: "*"
    password_expire_max: -1
    comment: "Created during provisioning"
  loop: "{{ role_users_user_details }}"
  when: vault_user_password is undefined

- name: Add user to sudoers
  community.general.sudoers:
    name: "{{ item.username }}_sudo"
    user: "{{ item.username }}"
    nopasswd: true
    commands: ALL
    state: present
  when: item.sudoers is true
  loop: '{{ role_users_user_details }}'

- name: Create .ssh directory
  ansible.builtin.file:
    path: /home/{{ item.username }}/.ssh
    state: directory
    mode: '0750'
    modification_time: preserve
    access_time: preserve
  loop: '{{ role_users_user_details }}'

- name: Ensure keys directory exists on controller
  ansible.builtin.file:
    path: "{{ playbook_dir }}/ssh_keys/{{ inventory_hostname }}"
    state: directory
    mode: '0755'

- name: Generate SSH keypair locally (controller)
  community.crypto.openssh_keypair:
    path: "{{ playbook_dir }}/ssh_keys/{{ inventory_hostname }}/{{ item.username }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    force: false
    local: true
  loop: "{{ role_users_user_details }}"
  register: generated_keys

- name: Copy public key to remote host
  ansible.posix.authorized_key:
    user: "{{ item.item.username }}"
    state: present
    key: "{{ lookup('file', item.stdout + '.pub') }}"
  loop: "{{ generated_keys.results }}"
  when: item.stdout is defined

- name: Authorize admin pub_key in authorized_keys
  ansible.posix.authorized_key:
    user: "{{ item.username }}"
    state: present
    key: "{{ lookup('file', 'files/main.pub') }}"
  loop: "{{ role_users_user_details }}"
