---
- name: Install EPEL for WireGuard
  dnf:
    name: epel-release
    state: present

- name: Install wireguard
  dnf:
    name: wireguard-tools
    state: present

- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/99-wireguard.conf

- name: Ensure WireGuard config directory exists
  file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

- name: Check existing WireGuard config
  stat:
    path: "/etc/wireguard/{{ wg_interface_name | default('wg0') }}.conf"
  register: wg_config_stat

- name: Deploy WireGuard server configuration from playbook
  copy:
    src: "{{ playbook_dir }}/{{ wg_server_config }}"
    dest: "/etc/wireguard/{{ wg_interface_name | default('wg0') }}.conf"
    mode: '0600'
    backup: yes
  when:
    - wg_server_config is defined
    - wg_server_config | length > 0
    - wg_server_config != 'none'

- name: Set WireGuard interface permissions
  file:
    path: "/etc/wireguard/{{ wg_interface_name | default('wg0') }}.conf"
    mode: '0600'
  when: wg_config_stat.stat.exists or (wg_server_config is defined and wg_server_config | length > 0 and wg_server_config != 'none')

- name: Enable and start WireGuard
  systemd:
    name: "wg-quick@{{ wg_interface_name | default('wg0') }}"
    state: stopped
    enabled: no
