---
- name: Install fail2ban
  dnf:
    name: fail2ban
    state: present

- name: Deploy fail2ban SSH jail configuration
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban

- name: Ensure fail2ban is enabled and started
  systemd:
    name: fail2ban
    state: started
    enabled: yes
