---
- name: Deploy sshd configuration
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0644'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart sshd

- name: Set sshd configured flag
  set_fact:
    sshd_configured: true

- name: Ensure sshd is enabled and started
  systemd:
    name: sshd
    state: started
    enabled: yes
